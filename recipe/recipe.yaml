schema_version: 1

context:
  name: dartsim
  version: "6.17.0"
  build_number: 1

recipe:
  name: ${{ name|lower }}-split
  version: ${{ version }}

source:
  - url: https://github.com/dartsim/dart/archive/v${{ version }}.tar.gz
    sha256: a5ab3e53dcaccc7bcc297e0ed0b31e348e26719f6c373751f6ee059d251b80a0
    patches:
      # Disable tutorials and examples to save build time
      - if: win
        then:
      # Avoid -A x64 for Ninja/NMake when building dartpy on Windows
          - patches/disable-tutorials-examples.patch
          - patches/fix-setup-msvc-ninja.patch
          - patches/dartpy-build-temp-env.patch
build:
  number: ${{ build_number }}

outputs:
  - package:
      name: dartsim-cpp
    build:
      script:
        file: ${{ "bld_cpp.bat" if win else "build_cpp.sh" }}
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - doxygen
        - ninja
        - if: win
          then: perl
        - pkg-config
      host:
        - assimp
        - bullet-cpp
        - console_bridge
        - eigen >=3.3.4,<5
        - fcl
        - fmt
        - if: not osx
          then: freeglut
        - imgui <1.92
        - ipopt
        - libboost-devel
        - if: linux
          then:
            - libgl-devel
            - libglu
        - libode
        - nlopt
        - octomap
        - openscenegraph
        - pagmo
        - pagmo-devel
        - tinyxml2
        - urdfdom
        - spdlog
      run:
        - eigen >=3.3.4,<5
        - octomap
        - spdlog
      run_exports:
        - ${{ pin_subpackage('dartsim-cpp', upper_bound='x.x') }}
      ignore_run_exports:
        from_package:
          - console_bridge
          - spdlog
    tests:
      - script:
          - if: osx
            then: test -f $PREFIX/lib/libdart.dylib
          - if: linux
            then: test -f $PREFIX/lib/libdart.so
          - if: not win
            then:
              - test -f $PREFIX/share/dart/cmake/dart_collision-odeTargets.cmake
              - test -f $PREFIX/share/dart/cmake/dart_collision-bulletTargets.cmake
            else:
              - if not exist %LIBRARY_LIB%\\dart.lib exit 1
              - if not exist %PREFIX%\\Library\\share\\dart\\cmake\\dart_collision-odeTargets.cmake exit 1
              - if not exist %PREFIX%\\Library\\share\\dart\\cmake\\dart_collision-bulletTargets.cmake exit 1
      - script:
          - cmake -S tests/cmake-consumer -B cmake-consumer-build -G Ninja
          - cmake --build cmake-consumer-build
          - if: not win
            then: ./cmake-consumer-build/dartsim_consumer_smoke
            else: cmake-consumer-build\\dartsim_consumer_smoke.exe
        files:
          recipe:
            - tests/cmake-consumer/
        requirements:
          run:
            - ${{ compiler('c') }}
            - ${{ compiler('cxx') }}
            - ${{ stdlib('c') }}
            - cmake
            - ninja
      - downstream: gz-physics8

  - package:
      name: dartpy
    build:
      script:
        file: ${{ "bld_py.bat" if win else "build_py.sh" }}
      skip:
        - (linux and match(python, "<3.12")) or (win and (match(python, "<3.12") or match(python, ">3.14")))
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - doxygen
        - ninja
        - if: win
          then: perl
        - pkg-config
        - if: build_platform != target_platform
          then:
            - cross-python_${{ target_platform }}
            - numpy
            - python
      host:
        # C++ deps
        - assimp
        - bullet-cpp
        - console_bridge
        - eigen >=3.3.4,<5
        - fcl
        - fmt
        - if: not osx
          then: freeglut
        - imgui <1.92
        - ipopt
        - libboost-devel
        - if: linux
          then:
            - libgl-devel
            - libglu
        - libode
        - nlopt
        - octomap
        - openscenegraph
        - pagmo
        - pagmo-devel
        - tinyxml2
        - urdfdom
        - spdlog
        - if: linux
          then: xorg-libxfixes
        # Python deps
        - numpy
        - pip
        - pybind11 >=2.13.6,<3
        - python
        - setuptools
        - wheel
      run:
        - if: linux
          then:
            - libgl
            - libglu
        - numpy
        - python
    tests:
      - python:
          imports:
            - dartpy
          pip_check: false

  - package:
      name: dartsim
    build:
      skip:
        - (linux and match(python, "<3.12")) or (win and (match(python, "<3.12") or match(python, ">3.14")))
    requirements:
      run:
        - ${{ pin_subpackage('dartsim-cpp', exact=True) }}
        - ${{ pin_subpackage('dartpy', exact=True) }}
        - python
        - numpy
      run_exports:
        - ${{ pin_subpackage('dartsim-cpp', upper_bound='x.x') }}
    tests:
      - python:
          imports:
            - dartpy
          pip_check: false
      - script:
          - if: osx
            then: test -f $PREFIX/lib/libdart.dylib
          - if: linux
            then: test -f $PREFIX/lib/libdart.so
          - if: not win
            then:
              - test -f $PREFIX/share/dart/cmake/dart_collision-odeTargets.cmake
              - test -f $PREFIX/share/dart/cmake/dart_collision-bulletTargets.cmake
            else:
              - if not exist %LIBRARY_LIB%\\dart.lib exit 1
              - if not exist %PREFIX%\\Library\\share\\dart\\cmake\\dart_collision-odeTargets.cmake exit 1
              - if not exist %PREFIX%\\Library\\share\\dart\\cmake\\dart_collision-bulletTargets.cmake exit 1
about:
  homepage: http://dartsim.github.io/
  license: BSD-2-Clause
  license_file: LICENSE
  summary: The DART (Dynamic Animation and Robotics Toolkit) library provides data structures and algorithms for kinematic and dynamic applications in robotics and computer animation.
  description: The DART (Dynamic Animation and Robotics Toolkit) library provides data structures and algorithms for kinematic and dynamic applications in robotics and computer animation.
  repository: https://github.com/dartsim/dart

extra:
  feedstock-name: dartsim
  recipe-maintainers:
    - jeongseok-meta
    - jslee02
    - traversaro
    - wolfv
